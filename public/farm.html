<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Моя ферма — Moose Farm</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="card">
    <h1>🌾 Моя ферма</h1>

    <div id="profile">Загрузка...</div>

    <section class="farm-grid">
      <button id="collectBtn">🧺 Собрать<br><small>60 минут кулдаун</small></button>
      <button id="upgrade1Btn">⬆️ Улучшить +1<br><small id="upgrade1Text">загрузка</small></button>
      <button id="upgrade10Btn">⬆️ Улучшить +10<br><small>до 10 уровней</small></button>
      <button id="testBalanceBtn">💰 +100k<br><small>тест</small></button>
      <button id="syncWizebotBtn">🔄 Sync WizeBot<br><small>через !синкферма</small></button>
    </section>

    <section id="licenseBox" class="license-section"></section>

    <section class="market-section">
      <h2>🏪 Рынок запчастей</h2>
      <div id="marketBox" class="market-card">Загрузка рынка...</div>
    </section>


    <section class="combat-section">
      <h2>⚔️ Рейды и защита</h2>
      <div id="combatBox" class="combat-grid">Загрузка боевого блока...</div>
    </section>

    <section class="extra-section">
      <h2>🎁 Кейсы / GAMUS / Оффсбор</h2>
      <div id="extrasBox" class="combat-grid">Загрузка...</div>
    </section>

    <section class="info-section">
      <h2>📊 Инфо и топы</h2>
      <div id="infoBox" class="info-card">Загрузка...</div>
      <div id="topsBox" class="info-card"></div>
    </section>

    <section class="buildings-section">
      <h2>🏗 Здания</h2>
      <div id="buildings" class="buildings-grid"></div>
    </section>

    <div id="message"></div>

    <form method="post" action="/auth/logout">
      <button class="secondary" type="submit">Выйти</button>
    </form>
  </main>

  <script src="/app.js"></script>
  <section id="admin-panel" class="admin-panel hidden">
  <h2>👑 Админ-панель</h2>
  <p class="admin-muted">Доступ только для Nico_Moose</p>

  <div class="admin-card">
    <h3>Игрок</h3>
    <input id="admin-login" placeholder="ник игрока" />
    <button id="admin-load-player">Посмотреть игрока</button>
  </div>

  <div id="admin-player-info" class="admin-result"></div>

  <div class="admin-grid">
    <div class="admin-card">
      <h3>Баланс</h3>
      <input id="admin-farm-amount" placeholder="+1000 или -1000" />
      <button id="admin-give-farm">Изменить фермерский баланс</button>

      <input id="admin-upgrade-amount" placeholder="+1кк или -500к" />
      <button id="admin-give-upgrade">Изменить бонусный баланс</button>

      <input id="admin-parts-amount" placeholder="+1000 или -1000" />
      <button id="admin-give-parts">Изменить запчасти</button>
    </div>

    <div class="admin-card">
      <h3>Уровни</h3>
      <input id="admin-level" placeholder="уровень фермы" />
      <button id="admin-set-level">Установить уровень фермы</button>

      <input id="admin-protection" placeholder="защита 0-120" />
      <button id="admin-set-protection">Установить защиту</button>

      <input id="admin-raid-power" placeholder="рейд-сила 0-200" />
      <button id="admin-set-raid-power">Установить рейд-силу</button>
    </div>

    <div class="admin-card danger-zone">
      <h3>Опасные действия</h3>
      <button id="admin-reset-raid">Сбросить КД рейда</button>
      <button id="admin-delete-buildings">Удалить постройки</button>
      <button id="admin-delete-farm" class="danger">Удалить ферму</button>
    </div>
  </div>

  <div id="admin-status" class="admin-status"></div>
</section>
</body>
</html>
